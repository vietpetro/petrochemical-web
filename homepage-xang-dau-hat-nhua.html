<script>
  // Nav scroll
  window.addEventListener('scroll',()=>{
    document.getElementById('navbar').classList.toggle('scrolled',window.scrollY>60)
  })

  // Hamburger
  function toggleMenu(){
    document.getElementById('navLinks').classList.toggle('open')
  }

  // Navigation Active State Handler
  function setActiveNav(){
    const sections = document.querySelectorAll('section[id]');
    const navLinks = document.querySelectorAll('.nav-links a');
    const scrollPos = window.scrollY + 150;
    let currentSection = '';
    
    // Find current section based on scroll position
    sections.forEach(section => {
      const sectionTop = section.offsetTop;
      const sectionHeight = section.offsetHeight;
      
      if (scrollPos >= sectionTop && scrollPos < sectionTop + sectionHeight) {
        currentSection = section.id;
      }
    });
    
    // Update active class
    navLinks.forEach(link => {
      link.classList.remove('active');
      const href = link.getAttribute('href');
      
      // Highlight link if its href matches the current section ID
      if (href && href === '#' + currentSection) {
        link.classList.add('active');
      }
    });
    
    // If at top of page (no section matched), activate first nav link as "home"
    // This handles the case where the user is at the very top before scrolling to any section.
    // The 'Trang Chủ' link needs to be explicitly handled if it's not the first item or not an anchor.
    const firstNavLink = navLinks[0];
    if (!currentSection && firstNavLink) {
        firstNavLink.classList.add('active');
    }
  }
   
  // Smooth scroll and update active on click
  document.querySelectorAll('.nav-links a').forEach(link => {
    link.addEventListener('click', (e) => {
      const href = link.getAttribute('href');
      
      // Handle anchor links
      if (href && href.startsWith('#')) {
        e.preventDefault();
        const target = document.querySelector(href);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
           
          // Update active immediately
          document.querySelectorAll('.nav-links a').forEach(l => l.classList.remove('active'));
          link.classList.add('active');
        }
      } else {
        // For external links or links that navigate to different pages, just close mobile menu
        // The active state for these will be handled by page load if they have a corresponding identifier
      }
      
      // Close mobile menu
      document.getElementById('navLinks').classList.remove('open');
    });
  });
   
  // Listen to scroll with debounce
  let scrollTimeout;
  window.addEventListener('scroll', () => {
    clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(setActiveNav, 100);
  });
   
  window.addEventListener('load', setActiveNav);

  // Smooth reveal on scroll
  const observer=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting) e.target.style.opacity='1',e.target.style.transform='translateY(0)'
    })
  },{threshold:.1})

  document.querySelectorAll('.product-card,.advantage-card,.about-grid,.hero-inner').forEach(el=>{
    el.style.opacity='0',el.style.transform='translateY(30px)',el.style.transition='opacity .6s ease,transform .6s ease'
    observer.observe(el)
  })
</script>
