        desc: "Hệ thống hơi, nước nóng, làm lạnh cho quá trình sản xuất."
      - title: "Tư vấn tối ưu năng lượng"
        desc: "Đánh giá tiêu thụ, đề xuất giải pháp tiết kiệm năng lượng."
    capabilities:
      - title: "Đội ngũ kỹ thuật chuyên sâu"
        desc: "Kinh nghiệm thiết kế, lắp đặt, bảo trì hệ thống năng lượng phức tạp."
      - title: "Chứng chỉ tiêu chuẩn quốc tế"
        desc: "Tuân thủ ISO 50001, IEC, và các tiêu chuẩn điện lực."
      - title: "Hỗ trợ sau bán hàng 24/7"
        desc: "Đội ngũ kỹ thuật phản hồi nhanh, bảo trì định kỳ."
