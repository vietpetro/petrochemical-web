        desc: "Kho hàng lớn, đủ loại, sẵn sàng giao hàng ngay."
      - title: "Đội ngũ tư vấn kỹ thuật"
        desc: "Các kỹ sư có経験, hỗ trợ chọn lựa và sử dụng đúng."
      - title: "Hệ thống phân phối quốc gia"
        desc: "Mạng lưới Đại lý và nhà phân phối để giao hàng nhanh."
    customers: ["Nhà máy sản xuất A", "Công ty logistics B", "Xưởng gia công C"]
